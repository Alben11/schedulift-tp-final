apiVersion: apps/v1
kind: Deployment
metadata:
  name: schedulift-frontend
spec:
  replicas: 2
  selector:
    matchLabels:
      app: schedulift-frontend
  template:
    metadata:
      labels:
        app: schedulift-frontend
    spec:
      containers:
        - name: schedulift-frontend
          image: alben11/schedulift-frontend:1.0
          ports:
            - containerPort: 80